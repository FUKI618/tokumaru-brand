name: Scrape & Update Rates

on:
  schedule:
    # JST 月初 00:01 (UTC 月末日 15:01)
    # 月次相場更新: 5社 × 12モデルをスクレイピング → rates.ts 自動更新
    - cron: '1 15 28-31 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (scrape & validate only, no commit)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  issues: write

concurrency:
  group: scrape-rates
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    defaults:
      run:
        working-directory: ./scripts/scrape
    steps:
      - uses: actions/checkout@v4

      - name: Guard — only run on JST day 01 (cron expansion 28-31 fires up to 4×/month)
        id: guard
        working-directory: ${{ github.workspace }}
        run: |
          JST_DAY=$(TZ=Asia/Tokyo date +%d)
          # workflow_dispatch (manual) は曜日制限を受けない
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Manual trigger — proceeding"
          elif [ "$JST_DAY" = "01" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "JST day=01 — proceeding"
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "JST day=$JST_DAY (not 01) — skipping (cron 28-31 over-firing)"
          fi

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/scrape/requirements.txt'

      - name: Install Python deps
        if: steps.guard.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape rates
        id: scrape
        if: steps.guard.outputs.skip != 'true'
        run: python -m scrape.main
        continue-on-error: true

      - name: Validate ±50% sanity check
        id: validate
        if: steps.guard.outputs.skip != 'true' && steps.scrape.outcome == 'success'
        run: python -m scrape.validate
        continue-on-error: true

      - name: Merge into src/data/rates.ts
        id: merge
        if: steps.guard.outputs.skip != 'true' && steps.validate.outcome == 'success'
        # merge.py uses absolute paths via __file__, so cwd doesn't matter for I/O.
        # Stay in scripts/scrape so module resolution works.
        run: python -m scrape.merge

      - name: Commit & push
        if: |
          steps.guard.outputs.skip != 'true' &&
          steps.merge.outcome == 'success' &&
          github.event.inputs.dry_run != 'true'
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/rates.ts src/data/rates-snapshot.json
          if git diff --staged --quiet; then
            echo "No changes to commit (rates unchanged)"
          else
            git commit -m "data(rates): auto-scrape monthly update $(date +%Y-%m)"
            git push
          fi

      - name: Create issue on anomaly
        if: |
          steps.guard.outputs.skip != 'true' &&
          (steps.scrape.outcome == 'failure' || steps.validate.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0,10);
            const reason = ${{ steps.scrape.outcome == 'failure' && '"scrape failed"' || '"validation failed"' }};
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[rate-scrape] ${reason} on ${date}`,
              body: `## Auto-scrape detected an anomaly\n\n` +
                    `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n` +
                    `- Reason: ${reason}\n` +
                    `- Action: rates.ts was NOT updated this cycle (previous values retained)\n` +
                    `- Next steps: review logs, possibly fix spider or selectors\n`,
              labels: ['rate-anomaly', 'automation']
            })
