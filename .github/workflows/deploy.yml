name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 月次自動リビルド (JST 基準)
    # キャンペーン月表記・rateMetadata.updatedAt を当月に切り替える。
    # 注: GitHub Actions の cron は UTC 固定なので JST に変換した時刻を指定する。
    #     さらに build step に TZ=Asia/Tokyo を渡し new Date() を JST 評価にする。
    #
    # JST 月初 (毎月 1 日 00:01 JST) を確実に踏むため、
    # UTC の月末日近辺 (28-31) 15:01 を全て対象にする。
    # → UTC 月末日 15:01 が JST 翌月 1 日 00:01 に対応するため、
    #   どの月でも必ず最後の発火が JST 月初に当たる。
    - cron: '1 15 28-31 * *'   # JST 月初 (= UTC 月末日 15:01) — メイン
    - cron: '1 15 14 * *'      # JST 15 日 00:01 (= UTC 14 日 15:01) — 月中
    - cron: '1 15 1 * *'       # JST 2 日 00:01 — セーフティネット
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        env:
          PUBLIC_SITE_BASE: /tokumaru-brand
          TZ: Asia/Tokyo   # calendar.ts の new Date() を JST 基準で評価する
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
