name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 月次自動リビルド: 毎月1日と15日 00:01 JST (= 15:01 UTC 前日)
    # キャンペーン月表記・rateMetadata.updatedAt を当月に切り替え
    - cron: '1 15 1,15 * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
        env:
          PUBLIC_SITE_BASE: /tokumaru-brand
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
